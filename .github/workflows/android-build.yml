name: Interactive macOS Build with VNC

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # Allow manual runs anytime
  schedule:
    - cron: "0 */6 * * *" # Auto-rerun every 6 hours

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install and Connect Tailscale on Mac
        env:
          TS_KEY: ${{ secrets.TAILSCALE_AUTHKEY }}
        run: |
          # Install official Tailscale app via Homebrew
          brew install tailscale

          # Start the Tailscale background service
          sudo tailscaled --state=tailscaled.state & sleep 5

          # Authenticate and connect to your tailnet
          sudo tailscale up --authkey=$TS_KEY --accept-routes

      - name: Setup and Start Apple VNC Server
        run: |
          # Enable Apple Remote Desktop (built-in VNC server)
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -activate -configure -access -on \
            -clientopts -setvncpasswd -vncpasswd "password123" \
            -restart -agent -privs -all

          echo "VNC Server is running on port 5900 with password: password123"

      - name: Keep Cloud Mac Alive For Testing
        run: |
          echo "The Mac is online! Check your Tailscale Admin Console for the new IP."
          echo "Connect using TigerVNC Viewer to IP:5900"
          SECONDS=0
          while true; do
            if [ $SECONDS -ge 21600 ]; then
              SECONDS=0
            fi
            sleep 1
          done
