name: Interactive macOS Build with VNC

on:
  workflow_dispatch: # Allows you to trigger this manually when you are ready

jobs:
  build:
    runs-on: macos-14

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Connect to Tailscale Network
      uses: tailscale/github-action@v2
      with:
        authkey: ${{ secrets.TAILSCALE_AUTHKEY }} # Connects the cloud Mac to your dashboard

    - name: Setup and Start Apple VNC Server
      run: |
        # Enables the official built-in Apple Remote Desktop server
        sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
          -activate -configure -access -on \
          -clientopts -setvncpasswd -vncpasswd "password123" \
          -restart -agent -privs -all
        echo "VNC Server is running on port 5900 with password: password123"

    - name: Keep Cloud Mac Alive For Testing
      run: |
        echo "The Mac is online! Check your Tailscale Admin Console for the new IP."
        echo "Connect using TigerVNC Viewer to IP:5900"
        sleep 1800 # Forces the server to stay completely online for 30 minutes
