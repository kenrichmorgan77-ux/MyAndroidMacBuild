name: Build Android APK on macOS

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:      # Mengizinkan Anda menjalankan build secara manual kapan saja

jobs:
  build:
    runs-on: macos-14      # Menggunakan server macOS Sonoma (Gratis tier private)
    timeout-minutes: 15

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Build APK
      run: |
        # Folder dummy untuk simulasi hasil build APK di macOS cloud
        mkdir -p app/build/outputs/apk/debug/
        echo "This is a dummy APK generated on macOS cloud" > app/build/outputs/apk/debug/app-debug.apk

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-macos
        path: app/build/outputs/apk/debug/*.apk
        retention-days: 7
